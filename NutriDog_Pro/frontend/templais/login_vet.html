<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Veterinario | NutriDog Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/longin_vet.css">
</head>
<body>

    <div class="login-container">
        <div class="header-accent">
            <div class="icon">🏥</div>
            <h2>SGA VETERINARIO</h2>
            <p>Sistema de Gestión Administrativa y Clínica</p>
        </div>

        <div class="form-body">
            <form action="admin.html">
                <div class="form-group">
                    <label>Identificación Profesional</label>
                    <div class="input-box">
                        <input type="email" placeholder="usuario@clinica.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña de Acceso</label>
                    <div class="input-box pass">
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">INICIAR SESIÓN CLÍNICA</button>
            </form>

            <div class="form-footer">
                <div class="register-box-vet">
                    <p>¿Es su primera vez en el sistema NutriDog Pro?</p>
                    <a href="registro_vet.html" class="btn-register-vet-link">SOLICITAR REGISTRO PROFESIONAL</a>
                </div>

                <a href="login.html" class="back-link">← Volver al Selector de Perfiles</a>
            </div>
        </div>
    </div>

</body>
</html>
